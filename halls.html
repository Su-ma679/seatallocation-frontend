<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halls</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
    <div class="logo">ExamSeat <span>Pro</span></div>
    <ul class="nav-links">
        <li><a href="dashboard.html">🏠 Dashboard</a></li>
        <li><a href="students.html">👨‍🎓 Students</a></li>
        <li><a href="halls.html" class="active">🏫 Halls</a></li>
        <li><a href="exams.html">📝 Exams</a></li>
        <li><a href="allocation.html">🪑 Allocation</a></li>
    </ul>
</nav>

<div class="container">
    <div class="page-title">🏫 Hall Management</div>

    <div class="card">
        <h3 style="margin-bottom:20px; color:#6c63ff;">Add New Hall</h3>
        <div class="form-grid">
            <div class="form-group">
                <label>Hall Name</label>
                <input type="text" id="hallName" placeholder="e.g. Hall A" />
            </div>
            <div class="form-group">
                <label>Number of Rows</label>
                <input type="number" id="rows" placeholder="e.g. 5" min="1" />
            </div>
            <div class="form-group">
                <label>Number of Columns</label>
                <input type="number" id="columns" placeholder="e.g. 6" min="1" />
            </div>
        </div>
        <button class="btn btn-primary" onclick="addHall()">+ Add Hall</button>
    </div>

    <div class="card" style="margin-top:20px;">
        <h3 style="margin-bottom:20px; color:#6c63ff;">All Halls</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Hall Name</th>
                        <th>Rows</th>
                        <th>Columns</th>
                        <th>Total Seats</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="hallsTable"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="confirmModal" class="modal">
    <div class="modal-box">
        <div style="font-size:45px; margin-bottom:15px;">⚠️</div>
        <h3 style="color:white; margin-bottom:8px;">Are you sure?</h3>
        <p style="color:#666; margin-bottom:25px; font-size:14px;">This cannot be undone!</p>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn btn-danger" onclick="confirmYes()">Yes, Delete</button>
            <button class="btn btn-primary" onclick="closeConfirm()">Cancel</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>
<script src="js/halls.js"></script>
</body>
</html>
