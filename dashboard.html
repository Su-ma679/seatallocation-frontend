<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
    <div class="logo">ExamSeat <span>Pro</span></div>
    <ul class="nav-links">
        <li><a href="dashboard.html" class="active">🏠 Dashboard</a></li>
        <li><a href="students.html">👨‍🎓 Students</a></li>
        <li><a href="halls.html">🏫 Halls</a></li>
        <li><a href="exams.html">📝 Exams</a></li>
        <li><a href="allocation.html">🪑 Allocation</a></li>
    </ul>
</nav>

<div class="container">
    <div class="page-title">📊 Dashboard</div>
    <div class="stats-grid">
        <div class="stat-card">
            <div class="icon">👨‍🎓</div>
            <div class="number" id="totalStudents">...</div>
            <div class="label">Total Students</div>
        </div>
        <div class="stat-card">
            <div class="icon">🏫</div>
            <div class="number" id="totalHalls">...</div>
            <div class="label">Total Halls</div>
        </div>
        <div class="stat-card">
            <div class="icon">📝</div>
            <div class="number" id="totalExams">...</div>
            <div class="label">Total Exams</div>
        </div>
        <div class="stat-card">
            <div class="icon">🪑</div>
            <div class="number" id="totalAllocations">...</div>
            <div class="label">Seat Allocations</div>
        </div>
    </div>
</div>

<script>
const API = 'http://localhost:8080/api';

async function loadStats() {
    try {
        const [students, halls, exams, allocations] = await Promise.all([
            fetch(`${API}/students/all`).then(r => r.json()),
            fetch(`${API}/halls/all`).then(r => r.json()),
            fetch(`${API}/exams/all`).then(r => r.json()),
            fetch(`${API}/allocation/all`).then(r => r.json())
        ]);
        document.getElementById('totalStudents').textContent = students.length;
        document.getElementById('totalHalls').textContent = halls.length;
        document.getElementById('totalExams').textContent = exams.length;
        document.getElementById('totalAllocations').textContent = allocations.length;
    } catch(e) {
        document.querySelectorAll('.number').forEach(el => el.textContent = '!');
    }
}

loadStats();
</script>
</body>
</html>
