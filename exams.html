<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exams</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
    <div class="logo">ExamSeat <span>Pro</span></div>
    <ul class="nav-links">
        <li><a href="dashboard.html">🏠 Dashboard</a></li>
        <li><a href="students.html">👨‍🎓 Students</a></li>
        <li><a href="halls.html">🏫 Halls</a></li>
        <li><a href="exams.html" class="active">📝 Exams</a></li>
        <li><a href="allocation.html">🪑 Allocation</a></li>
    </ul>
</nav>

<div class="container">
    <div class="page-title">📝 Exam Management</div>

    <div class="card">
    <h3 style="margin-bottom:20px; color:#6c63ff;">Schedule New Exam</h3>
    <div class="form-grid">
        <div class="form-group">
            <label>Subject Code</label>
            <input type="text" id="subjectCode" placeholder="e.g. CS401" />
        </div>
        <div class="form-group">
            <label>Subject Name</label>
            <input type="text" id="subject" placeholder="e.g. Data Structures" />
        </div>
        <div class="form-group">
            <label>Date</label>
            <input type="date" id="examDate" />
        </div>
        <div class="form-group">
            <label>Start Time</label>
            <input type="time" id="startTime" />
        </div>
        <div class="form-group">
            <label>End Time</label>
            <input type="time" id="endTime" />
        </div>
        <div class="form-group">
            <label>Department</label>
            <select id="department">
                <option value="CSE">CSE</option>
                <option value="ECE">ECE</option>
                <option value="MECH">MECH</option>
                <option value="CIVIL">CIVIL</option>
                <option value="IT">IT</option>
                <option value="EEE">EEE</option>
                <option value="ALL">ALL Departments</option>
            </select>
        </div>
        <div class="form-group">
            <label>Year</label>
            <select id="year">
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
            </select>
        </div>
    </div>
    <button class="btn btn-primary" onclick="addExam()">+ Schedule Exam</button>
</div>

    <div class="card" style="margin-top:20px;">
        <h3 style="margin-bottom:20px; color:#6c63ff;">All Exams</h3>
        <div class="table-container">
            <table>
                 <thead>
    <tr>
        <th>#</th>
        <th>Code</th>
        <th>Subject</th>
        <th>Date</th>
        <th>Start Time</th>
        <th>End Time</th>
        <th>Department</th>
        <th>Year</th>
        <th>Status</th>
        <th>Action</th>
    </tr>
</thead>
                <tbody id="examsTable"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="confirmModal" class="modal">
    <div class="modal-box">
        <div style="font-size:45px; margin-bottom:15px;">⚠️</div>
        <h3 style="color:white; margin-bottom:8px;">Are you sure?</h3>
        <p style="color:#666; margin-bottom:25px; font-size:14px;">This cannot be undone!</p>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn btn-danger" onclick="confirmYes()">Yes, Delete</button>
            <button class="btn btn-primary" onclick="closeConfirm()">Cancel</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>
<script src="js/exams.js"></script>
</body>
</html>
